<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FAKE GURU — Digital Products</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07070b;--bg-2:#0c0c14;--surface:rgba(255,255,255,.035);--surface-2:rgba(255,255,255,.06);
    --line:rgba(255,255,255,.09);--line-2:rgba(255,255,255,.16);--text:#f4f4f8;--muted:#9a9ab0;--faint:#6a6a80;
    --violet:#7c5cff;--violet-2:#5b3df5;--cyan:#22d3ee;--emerald:#34d399;--rose:#fb7185;
    --radius:18px;--radius-sm:12px;--maxw:1180px;--shadow:0 24px 60px -20px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;overflow-x:hidden;position:relative}
  body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(120px);z-index:0;pointer-events:none;opacity:.55}
  body::before{width:560px;height:560px;background:radial-gradient(circle,#3a1f8f,transparent 70%);top:-200px;left:-160px}
  body::after{width:520px;height:520px;background:radial-gradient(circle,#0e4d63,transparent 70%);bottom:-220px;right:-140px}
  h1,h2,h3,.brand,.price,.badge{font-family:'Space Grotesk',sans-serif}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;position:relative;z-index:1}
  header{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(7,7,11,.72);border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:72px;gap:20px}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--text);font-weight:700;font-size:1.15rem;letter-spacing:.02em}
  .brand .mark{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(135deg,var(--violet),var(--violet-2));font-weight:700;font-size:1.05rem;box-shadow:0 6px 20px -6px var(--violet);overflow:hidden}
  .brand .mark img{width:100%;height:100%;border-radius:11px;object-fit:cover}
  .nav-links{display:flex;align-items:center;gap:8px;margin-left:auto}
  .nav-links a{color:var(--muted);text-decoration:none;font-weight:600;font-size:.9rem;padding:8px 14px;border-radius:10px;transition:.18s}
  .nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--surface-2)}
  .cart-btn{display:flex;align-items:center;gap:9px;border:1px solid var(--line-2);background:var(--surface);color:var(--text);font-weight:600;font-size:.9rem;padding:9px 15px;border-radius:11px;cursor:pointer;transition:.18s;font-family:'Space Grotesk'}
  .cart-btn:hover{border-color:var(--violet);background:var(--surface-2)}
  .cart-btn .count{background:var(--violet);color:#fff;min-width:20px;height:20px;border-radius:6px;display:grid;place-items:center;font-size:.72rem;padding:0 5px}
  .hero{padding:70px 0 36px;text-align:center}
  .hero .eyebrow{display:inline-block;font-family:'Space Grotesk';font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;color:var(--violet);border:1px solid var(--line-2);padding:6px 14px;border-radius:999px;margin-bottom:22px}
  .hero h1{font-size:clamp(2.1rem,5vw,3.4rem);line-height:1.05;letter-spacing:-.02em;margin-bottom:16px}
  .hero h1 span{background:linear-gradient(120deg,var(--violet),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{color:var(--muted);max-width:560px;margin:0 auto;font-size:1.02rem}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:22px;padding:18px 0 60px}
  .card{position:relative;border:1px solid var(--line);background:var(--surface);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;transition:transform .2s,border-color .2s,box-shadow .2s;cursor:pointer;overflow:hidden}
  .card:hover{transform:translateY(-4px);border-color:var(--line-2);box-shadow:var(--shadow)}
  .card.oos{opacity:.62}
  .cover{position:relative;aspect-ratio:16/10;border-radius:var(--radius-sm);overflow:hidden;background:linear-gradient(135deg,#14141f,#1d1530);display:grid;place-items:center;margin-bottom:14px}
  .cover img{width:100%;height:100%;object-fit:cover}
  .cover .emoji{font-size:3rem;filter:drop-shadow(0 6px 14px rgba(0,0,0,.5))}
  .badge{position:absolute;top:10px;left:10px;font-size:.66rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border-radius:8px;color:#fff;background:linear-gradient(135deg,#ff5b5b,#ff8a3d);box-shadow:0 6px 16px -6px #ff5b5b}
  .card h3{font-size:1.02rem;font-weight:600;line-height:1.3;margin-bottom:8px}
  .card .desc-mini{color:var(--faint);font-size:.82rem;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .stock{font-size:.8rem;font-weight:600;font-family:'Space Grotesk';margin-bottom:14px}
  .stock.in{color:var(--emerald)}
  .stock.in .num{color:var(--text);opacity:.7;font-weight:500}
  .stock.out{color:var(--rose)}
  .card .foot{margin-top:auto;display:flex;align-items:center;gap:10px}
  .buy{flex:1;border:none;border-radius:11px;padding:11px;font-family:'Space Grotesk';font-weight:600;font-size:.9rem;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--violet),var(--violet-2));transition:.18s}
  .buy:hover{filter:brightness(1.12)}
  .buy:disabled{background:var(--surface-2);color:var(--faint);cursor:not-allowed;filter:none}
  .price{font-family:'Space Grotesk';font-weight:700;font-size:1.05rem;white-space:nowrap}
  .overlay{position:fixed;inset:0;background:rgba(3,3,7,.72);backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 18px;overflow-y:auto}
  .overlay.open{display:flex}
  .modal{width:100%;max-width:560px;background:linear-gradient(180deg,#101019,#0a0a12);border:1px solid var(--line-2);border-radius:22px;box-shadow:var(--shadow);position:relative;animation:pop .22s ease}
  @keyframes pop{from{transform:translateY(14px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .modal .x{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--text);font-size:1.1rem;cursor:pointer;display:grid;place-items:center;transition:.18s;z-index:2}
  .modal .x:hover{background:var(--surface-2)}
  .modal-head{padding:26px 26px 18px;border-bottom:1px solid var(--line)}
  .modal-head .mcover{width:100%;aspect-ratio:16/8;border-radius:14px;overflow:hidden;background:linear-gradient(135deg,#14141f,#1d1530);display:grid;place-items:center;margin-bottom:18px}
  .modal-head .mcover img{width:100%;height:100%;object-fit:cover}
  .modal-head .mcover .emoji{font-size:3.4rem}
  .modal-head h2{font-size:1.35rem;line-height:1.2;padding-right:30px}
  .modal-body{padding:22px 26px;max-height:42vh;overflow-y:auto}
  .modal-body p{color:var(--muted);font-size:.92rem;margin-bottom:10px;white-space:pre-line}
  .modal-foot{padding:20px 26px 26px;border-top:1px solid var(--line)}
  .qty-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .qty-row label{font-size:.85rem;color:var(--muted);font-weight:600}
  .qty{display:flex;align-items:center;border:1px solid var(--line-2);border-radius:10px;overflow:hidden}
  .qty button{width:38px;height:38px;background:var(--surface);border:none;color:var(--text);font-size:1.2rem;cursor:pointer}
  .qty button:hover{background:var(--surface-2)}
  .qty span{width:46px;text-align:center;font-family:'Space Grotesk';font-weight:600}
  .mtotal{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;font-family:'Space Grotesk'}
  .mtotal .lbl{color:var(--muted);font-size:.9rem}.mtotal .val{font-size:1.5rem;font-weight:700}
  .mactions{display:flex;flex-direction:column;gap:10px}
  .btn-primary,.btn-ghost{border-radius:12px;padding:14px;font-family:'Space Grotesk';font-weight:600;font-size:.95rem;cursor:pointer;transition:.18s;text-align:center}
  .btn-primary{border:none;color:#fff;background:linear-gradient(135deg,var(--violet),var(--violet-2))}
  .btn-primary:hover{filter:brightness(1.12)}.btn-primary:disabled{background:var(--surface-2);color:var(--faint);cursor:not-allowed;filter:none}
  .btn-ghost{border:1px solid var(--line-2);background:transparent;color:var(--text)}.btn-ghost:hover{background:var(--surface)}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:105;display:none}.scrim.show{display:block}
  .drawer{position:fixed;top:0;right:0;height:100%;width:400px;max-width:92vw;background:linear-gradient(180deg,#0d0d15,#08080d);border-left:1px solid var(--line-2);z-index:110;transform:translateX(100%);transition:transform .26s ease;display:flex;flex-direction:column;box-shadow:-30px 0 60px -30px #000}
  .drawer.open{transform:none}
  .drawer-head{display:flex;align-items:center;justify-content:space-between;padding:22px 22px 18px;border-bottom:1px solid var(--line)}
  .drawer-head h3{font-size:1.1rem}
  .drawer-head .x{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--text);cursor:pointer;font-size:1rem}
  .drawer-items{flex:1;overflow-y:auto;padding:14px 22px}
  .citem{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
  .citem .ic{width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,#14141f,#1d1530);display:grid;place-items:center;font-size:1.5rem;flex-shrink:0;overflow:hidden}
  .citem .ic img{width:100%;height:100%;object-fit:cover}
  .citem .info{flex:1;min-width:0}.citem .info h4{font-size:.88rem;font-weight:600;margin-bottom:3px}
  .citem .info .sub{font-size:.78rem;color:var(--faint)}
  .citem .rm{background:none;border:none;color:var(--faint);cursor:pointer;font-size:.78rem;text-decoration:underline;margin-top:4px;padding:0}.citem .rm:hover{color:var(--rose)}
  .citem .cp{font-family:'Space Grotesk';font-weight:600;font-size:.92rem}
  .cart-empty{text-align:center;color:var(--faint);padding:60px 20px;font-size:.92rem}
  .drawer-foot{padding:20px 22px;border-top:1px solid var(--line-2)}
  .drawer-foot .sum{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;font-family:'Space Grotesk'}
  .drawer-foot .sum .v{font-size:1.4rem;font-weight:700}
  .pay h3{font-size:1.15rem;margin-bottom:6px}
  .pay .order-id{font-family:'Space Grotesk';background:var(--surface-2);border:1px dashed var(--line-2);border-radius:10px;padding:10px 14px;font-size:.95rem;margin:14px 0;text-align:center;letter-spacing:.05em}
  .pay .order-id b{color:var(--cyan)}
  .step{display:flex;gap:12px;margin-bottom:16px}
  .step .n{flex-shrink:0;width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--violet),var(--violet-2));display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:.82rem;color:#fff}
  .step .t{font-size:.9rem;color:var(--muted)}.step .t b{color:var(--text)}
  .pmethods{display:flex;flex-direction:column;gap:10px;margin:8px 0 18px}
  .pm{border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:13px 15px}
  .pm .top{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .pm .top .name{display:flex;align-items:center;gap:10px;font-weight:600;font-size:.92rem}
  .pm .top .name .ico{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:1rem;background:var(--surface-2)}
  .pm .copyable{margin-top:11px;display:none}.pm.open .copyable{display:block}
  .pm .field{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--bg-2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-top:7px}
  .pm .field code{font-family:'Space Grotesk';font-size:.82rem;color:var(--text);word-break:break-all}
  .pm .field button{flex-shrink:0;border:1px solid var(--line-2);background:var(--surface);color:var(--text);font-size:.74rem;padding:5px 10px;border-radius:7px;cursor:pointer;font-weight:600}
  .pm .field a{font-size:.78rem;color:var(--cyan);text-decoration:none;font-weight:600}
  .contact-row{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
  .contact-row a,.contact-row .chip{flex:1;min-width:120px;display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--line-2);border-radius:11px;padding:12px;text-decoration:none;color:var(--text);font-weight:600;font-size:.85rem;font-family:'Space Grotesk';transition:.18s;cursor:pointer}
  .contact-row a:hover,.contact-row .chip:hover{background:var(--surface)}
  footer{border-top:1px solid var(--line);padding:48px 0 40px;text-align:center;position:relative;z-index:1;margin-top:40px}
  .foot-links{display:flex;gap:24px;justify-content:center;margin-bottom:20px}
  .foot-links a{color:var(--muted);text-decoration:none;font-weight:600;font-size:.88rem}.foot-links a:hover{color:var(--text)}
  .foot-social{display:flex;gap:12px;justify-content:center;margin-bottom:18px}
  .foot-social a{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);display:grid;place-items:center;color:var(--muted);transition:.18s}
  .foot-social a:hover{color:var(--text);border-color:var(--line-2);background:var(--surface)}
  footer .copy{color:var(--faint);font-size:.82rem}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#15151f;border:1px solid var(--line-2);color:var(--text);padding:13px 22px;border-radius:12px;font-size:.88rem;font-weight:600;z-index:200;opacity:0;transition:.25s;box-shadow:var(--shadow);pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:640px){.nav{height:64px}.hero{padding:48px 0 16px}.grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}.cover .emoji{font-size:2.2rem}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto}}
  ::-webkit-scrollbar{width:9px}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:9px}
</style>
</head>
<body>
<header>
  <div class="wrap nav">
    <a href="#" class="brand"><span class="mark" id="brand-mark">FG</span><span id="brand-name">FAKE GURU</span></a>
    <nav class="nav-links"><a href="#shop" class="active">Shop</a><a id="support-link" href="#" target="_blank">Support</a></nav>
    <button class="cart-btn" id="cart-toggle">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="count" id="cart-count">0</span>
    </button>
  </div>
</header>
<section class="hero wrap" id="shop">
  <span class="eyebrow">Digital Products</span>
  <h1 id="hero-title">YouTube ebooks that <span>deliver.</span></h1>
  <p id="hero-sub">Instant delivery after payment confirmation.</p>
</section>
<main class="wrap"><div class="grid" id="grid"></div></main>
<footer>
  <div class="foot-social" id="foot-social"></div>
  <p class="copy" id="footer-copy">© 2026 FAKE GURU. All rights reserved.</p>
</footer>
<div class="overlay" id="overlay"><div class="modal" role="dialog" aria-modal="true">
  <button class="x" id="modal-close" aria-label="Close">✕</button>
  <div class="modal-head"><div class="mcover" id="m-cover"></div><h2 id="m-title"></h2></div>
  <div class="modal-body" id="m-body"></div>
  <div class="modal-foot">
    <div class="qty-row"><label>Quantity</label><div class="qty"><button id="q-minus">−</button><span id="q-val">1</span><button id="q-plus">+</button></div></div>
    <div class="mtotal"><span class="lbl">Total</span><span class="val" id="m-total">$0.00</span></div>
    <div class="mactions"><button class="btn-primary" id="m-buy">Buy Now</button><button class="btn-ghost" id="m-add">Add to Cart</button></div>
  </div>
</div></div>
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head"><h3 id="drawer-title">Cart</h3><button class="x" id="drawer-close">✕</button></div>
  <div class="drawer-items" id="drawer-items"></div>
  <div class="drawer-foot" id="drawer-foot"></div>
</aside>
<div class="toast" id="toast"></div>

<script>
/* fallback so the page still shows products if the API is unreachable (e.g. preview) */
const DEFAULTS = {
  brand:{name:"FAKE GURU",logo:"",heroTitle:"YouTube ebooks that <span>deliver.</span>",heroSub:"Instant delivery after payment confirmation.",copyright:"© 2026 FAKE GURU. All rights reserved."},
  contact:{x:"https://x.com/FakeYTGuru1",discord:"fakegurux",supportUrl:"https://x.com/FakeYTGuru1"},
  pay:{paypal:"https://paypal.me/fakeguru1",wise:"https://wise.com/pay/me/mergimh24",binancePay:"",usdt:"",bnb:"",eth:""},
  products:[
    {id:"yt1",title:"Youtube 1",img:"",price:9.99,stock:null,badge:"Bestseller",short:"Your first YouTube ebook.",desc:"Edit this in the admin panel."},
    {id:"yt2",title:"Youtube 2",img:"",price:12.99,stock:40,badge:"",short:"Your second YouTube ebook.",desc:""},
    {id:"yt3",title:"Youtube 3",img:"",price:14.99,stock:25,badge:"New",short:"Your third YouTube ebook.",desc:""},
    {id:"yt4",title:"Youtube 4",img:"",price:17.99,stock:null,badge:"",short:"Your fourth YouTube ebook.",desc:""},
    {id:"yt5",title:"Youtube 5",img:"",price:19.99,stock:10,badge:"",short:"Your fifth YouTube ebook.",desc:""},
    {id:"yt6",title:"Youtube 6",img:"",price:24.99,stock:0,badge:"-40%",short:"Your sixth YouTube ebook.",desc:""}
  ]
};

(function(){
  const money=n=>"$"+Number(n).toFixed(2);
  const $=id=>document.getElementById(id);
  let DATA=DEFAULTS, cart=[], modalProduct=null, modalQty=1;
  const findP=id=>DATA.products.find(p=>p.id===id);
  const coverHTML=p=>p.img?`<img src="${p.img}" alt="">`:`<span class="emoji">🎬</span>`;
  const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  async function load(){
    try{ const r=await fetch('/api/data',{cache:'no-store'}); if(r.ok) DATA=await r.json(); }catch(e){}
    render();
  }

  function render(){
    $("brand-name").textContent=DATA.brand.name;
    if(DATA.brand.logo) $("brand-mark").innerHTML=`<img src="${DATA.brand.logo}" alt="">`;
    $("hero-title").innerHTML=DATA.brand.heroTitle||"";
    $("hero-sub").textContent=DATA.brand.heroSub||"";
    $("footer-copy").textContent=DATA.brand.copyright||"";
    $("support-link").href=DATA.contact.supportUrl||DATA.contact.x||"#";
    $("foot-social").innerHTML = DATA.contact.x
      ? `<a href="${DATA.contact.x}" target="_blank" aria-label="X"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.9 1.2h3.7l-8 9.2 9.5 12.4h-7.5l-5.8-7.6-6.7 7.6H.4l8.6-9.8L0 1.2h7.7l5.3 7 5.9-7zm-1.3 19.5h2L7.1 3.3H5l12.6 17.4z"/></svg></a>` : "";
    renderGrid();
  }

  function renderGrid(){
    $("grid").innerHTML=DATA.products.map(p=>{
      const out=p.stock===0;
      const stockHTML=out?`<div class="stock out">Out of Stock</div>`
        :`<div class="stock in">In Stock${p.stock!=null?` <span class="num">(${p.stock})</span>`:""}</div>`;
      return `<article class="card ${out?'oos':''}" data-id="${p.id}">
        <div class="cover">${p.badge?`<span class="badge">${esc(p.badge)}</span>`:""}${coverHTML(p)}</div>
        <h3>${esc(p.title)}</h3><p class="desc-mini">${esc(p.short)}</p>${stockHTML}
        <div class="foot"><button class="buy" ${out?'disabled':''}>${out?'Sold out':'Buy'}</button><span class="price">${money(p.price)}</span></div>
      </article>`;
    }).join("");
    $("grid").querySelectorAll(".card").forEach(c=>c.onclick=()=>openModal(c.dataset.id));
  }

  function openModal(id){
    const p=findP(id);modalProduct=p;modalQty=1;
    $("m-cover").innerHTML=coverHTML(p);$("m-title").textContent=p.title;
    $("m-body").innerHTML=`<p>${esc(p.desc||p.short||"")}</p>`;
    const out=p.stock===0;
    $("q-val").textContent=1;updateTotal();
    $("m-buy").disabled=out;$("m-add").disabled=out;$("m-buy").textContent=out?"Sold out":"Buy Now";
    $("overlay").classList.add("open");document.body.style.overflow="hidden";
  }
  function closeModal(){$("overlay").classList.remove("open");document.body.style.overflow="";}
  function updateTotal(){$("m-total").textContent=money(modalProduct.price*modalQty);}
  $("modal-close").onclick=closeModal;
  $("overlay").onclick=e=>{if(e.target===$("overlay"))closeModal();};
  $("q-minus").onclick=()=>{if(modalQty>1){modalQty--;$("q-val").textContent=modalQty;updateTotal();}};
  $("q-plus").onclick=()=>{modalQty++;$("q-val").textContent=modalQty;updateTotal();};
  $("m-add").onclick=()=>{addToCart(modalProduct.id,modalQty);closeModal();openDrawer();};
  $("m-buy").onclick=()=>{addToCart(modalProduct.id,modalQty);closeModal();showCheckout();};

  function addToCart(id,qty){const ex=cart.find(c=>c.id===id);if(ex)ex.qty+=qty;else cart.push({id,qty});count();toast("Added to cart");}
  function removeFromCart(id){cart=cart.filter(c=>c.id!==id);count();renderCart();}
  function cartTotal(){return cart.reduce((s,c)=>s+findP(c.id).price*c.qty,0);}
  function count(){$("cart-count").textContent=cart.reduce((s,c)=>s+c.qty,0);}

  function renderCart(){
    const box=$("drawer-items"),foot=$("drawer-foot");$("drawer-title").textContent="Cart";
    if(!cart.length){box.innerHTML=`<div class="cart-empty">Your cart is empty.</div>`;foot.innerHTML="";return;}
    box.innerHTML=cart.map(c=>{const p=findP(c.id);return `<div class="citem"><div class="ic">${coverHTML(p)}</div>
      <div class="info"><h4>${esc(p.title)}</h4><div class="sub">${c.qty} × ${money(p.price)}</div><button class="rm" data-id="${p.id}">remove</button></div>
      <div class="cp">${money(p.price*c.qty)}</div></div>`;}).join("");
    box.querySelectorAll(".rm").forEach(b=>b.onclick=()=>removeFromCart(b.dataset.id));
    foot.innerHTML=`<div class="sum"><span>Total</span><span class="v">${money(cartTotal())}</span></div><button class="btn-primary" id="checkout-btn" style="width:100%">Checkout</button>`;
    $("checkout-btn").onclick=showCheckout;
  }
  function openDrawer(){renderCart();$("drawer").classList.add("open");$("scrim").classList.add("show");}
  function closeDrawer(){$("drawer").classList.remove("open");$("scrim").classList.remove("show");}
  $("cart-toggle").onclick=openDrawer;$("drawer-close").onclick=closeDrawer;$("scrim").onclick=closeDrawer;

  function showCheckout(){
    if(!cart.length){openDrawer();return;}
    $("drawer").classList.add("open");$("scrim").classList.add("show");$("drawer-title").textContent="Payment";
    const orderId="FG-"+Date.now().toString(36).toUpperCase().slice(-6);
    const pay=DATA.pay||{};
    const methods=[];
    if(pay.paypal) methods.push({n:"PayPal",i:"🅿️",f:[{l:"PayPal",v:pay.paypal,link:true}]});
    if(pay.wise)   methods.push({n:"Wise",i:"🏦",f:[{l:"Wise",v:pay.wise,link:true}]});
    const cf=[];
    if(pay.binancePay) cf.push({l:"Binance Pay",v:pay.binancePay,link:true});
    if(pay.usdt) cf.push({l:"USDT",v:pay.usdt});
    if(pay.bnb)  cf.push({l:"BNB",v:pay.bnb});
    if(pay.eth)  cf.push({l:"ETH",v:pay.eth});
    if(cf.length) methods.push({n:"Crypto",i:"₿",f:cf});

    const c=DATA.contact||{};
    const contacts=[];
    if(c.x) contacts.push(`<a class="x" href="${c.x}" target="_blank">𝕏 &nbsp;on X</a>`);
    if(c.discord) contacts.push(`<span class="chip" data-copy="${esc(c.discord)}">Discord: ${esc(c.discord)} (copy)</span>`);

    $("drawer-items").innerHTML=`<div class="pay">
      <h3>Almost done 🎉</h3>
      <p style="color:var(--muted);font-size:.9rem">Amount: <b style="color:var(--text)">${money(cartTotal())}</b> · Pick a payment method.</p>
      <div class="order-id">Order No: <b>${orderId}</b></div>
      <div class="step"><div class="n">1</div><div class="t"><b>Pay</b> the amount with one of the methods below.</div></div>
      <div class="pmethods">${methods.map(m=>`<div class="pm"><div class="top"><span class="name"><span class="ico">${m.i}</span>${m.n}</span><span style="color:var(--faint);font-size:.8rem">show ▾</span></div>
        <div class="copyable">${m.f.map(x=>`<div class="field"><code>${esc(x.l)}: ${esc(x.v)}</code>${x.link?`<a href="${x.v}" target="_blank">open ↗</a>`:`<button data-copy="${esc(x.v)}">Copy</button>`}</div>`).join("")}</div></div>`).join("")}</div>
      <div class="step"><div class="n">2</div><div class="t">Take a <b>screenshot</b> of the payment.</div></div>
      <div class="step"><div class="n">3</div><div class="t">Send the screenshot + your <b>Order No</b> to me:</div></div>
      <div class="contact-row">${contacts.join("")}</div>
      <p style="color:var(--faint);font-size:.8rem;margin-top:14px;text-align:center">You'll receive your ebook once payment is confirmed.</p>
    </div>`;
    $("drawer-items").querySelectorAll(".pm .top").forEach(t=>t.onclick=()=>t.parentElement.classList.toggle("open"));
    $("drawer-items").querySelectorAll("[data-copy]").forEach(b=>b.onclick=e=>{e.stopPropagation();navigator.clipboard&&navigator.clipboard.writeText(b.dataset.copy);toast("Copied ✓");});
    $("drawer-foot").innerHTML=`<button class="btn-ghost" id="back-shop" style="width:100%">Keep browsing</button>`;
    $("back-shop").onclick=closeDrawer;
  }

  let tt;function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),1800);}
  document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeModal();closeDrawer();}});
  load();
})();
</script>
</body>
</html>
